                          const nv = NIVELES[r.nivel];
                          return (
                            <button key={r.codigo} onClick={() => { setSearchOpen(false); openRA(r.codigo); }} className="w-full text-left p-2.5 rounded-lg hover:bg-slate-50 flex items-start gap-3">
                              <span className="text-[10px] font-black text-slate-500 w-12 shrink-0 pt-0.5">{r.codigo}</span>
                              <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-1.5 mb-1">
                                  <span className="text-[9px] font-black px-1.5 py-0.5 rounded border" style={{backgroundColor:dom.light, color:dom.text, borderColor:dom.border}}>C{r.comp}</span>
                                  <span className={`text-[9px] font-black px-1.5 py-0.5 rounded border ${nv.bg} ${nv.text} ${nv.border}`}>{r.nivel}</span>
                                </div>
                                <p className={`text-[11.5px] leading-tight ${r.sin_desc ? 'italic text-red-500' : 'text-slate-700'}`}>{r.descripcion.substring(0,140)}{r.descripcion.length>140?'...':''}</p>
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {searchResults.courses.length === 0 && searchResults.ras.length === 0 && (
                    <p className="text-center text-[12px] text-slate-400 italic py-10">Sin resultados para "{searchQ}"</p>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
